{% load allauth %}

<section class="rounded-default border border-base-200 bg-white p-5 shadow-xs dark:border-base-800 dark:bg-base-900">
    <h2 class="text-lg font-semibold tracking-tight text-font-important-light dark:text-font-important-dark">
        {% slot title %}
        {% endslot %}
    </h2>

    <div class="mt-3 space-y-4 text-font-default-light dark:text-font-default-dark">
        {% slot body %}
        {% endslot %}
    </div>

    {% if slots.actions %}
        <div class="mt-5 flex flex-wrap gap-3">
            {% slot actions %}
            {% endslot %}
        </div>
    {% endif %}
</section>
